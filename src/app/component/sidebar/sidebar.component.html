<div class="relative flex h-screen flex-col bg-white shadow-xl transition-all duration-300"
[ngClass]="{ 'w-64': !isCollapsed, 'w-20': isCollapsed }">

    <button 
  (click)="isCollapsed = !isCollapsed"
  class="absolute top-4 right-4 p-2 rounded bg-gray-500 text-white hover:bg-gray-600 transition"
>
  <!-- Icon can be something like ≡ or ←/→ -->
  <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2"
       viewBox="0 0 24 24">
    <path d="M4 6h16M4 12h16M4 18h16" />
  </svg>
</button>

    <!-- Sidebar Header -->
    <div class="p-6 flex justify-center items-center">
      <h5 class="text-2xl font-bold tracking-wide text-gray-800" *ngIf="!isCollapsed">Dashboard</h5>
    </div>
  
    <!-- Sidebar Navigation -->
    <nav class="flex flex-col gap-1 p-4 text-base text-gray-700">
      <div
        *ngFor="let item of sidebarItems"
        (click)="onItemClick(item)"
        role="button"
        class="group flex items-center gap-3 p-3 rounded-lg cursor-pointer transition-all duration-200 hover:bg-blue-100 hover:text-blue-700"
      >
        <a
          class="flex items-center w-full"
          [routerLink]="item.link"
        >
          <!-- Icon Wrapper -->
          <div class="grid place-items-center w-8 h-8 rounded-md bg-blue-50 text-blue-600 group-hover:text-white transition">
            <svg [attr.viewBox]="item.icon.viewBox" class="w-5 h-5">
              <path [attr.d]="item.icon.d"></path>
            </svg>
          </div>
  
          <!-- Item Name -->
          <span 
          class="ml-2 font-medium group-hover:font-semibold transition-all duration-200"
          *ngIf="!isCollapsed">{{ item.name }}</span>
        </a>
      </div>
    </nav>
  </div>
